<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{TAGLINE}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{TAGLINE}}" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0e0f12" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐔</text></svg>"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">🐔</span>
        <h1>{{TITLE}}</h1>
      </div>
      <div class="status">
        <div class="live" id="live" role="status" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span class="live-label">LIVE</span>
        </div>
        <div class="viewers" id="viewers-wrap" title="People watching right now">
          <span class="eye" aria-hidden="true">👁</span>
          <span id="viewers">–</span>
          <span class="viewers-label">watching</span>
        </div>
      </div>
    </header>

    <main>
      <div class="player">
        <video id="video" playsinline autoplay muted controls></video>
        <div class="overlay" id="overlay">
          <div class="spinner" aria-hidden="true"></div>
          <p id="status">Warming up the coop…</p>
        </div>
      </div>
      <p class="tagline">{{TAGLINE}}</p>

      <section class="sightings" id="sightings" hidden>
        <h2 class="sightings-title">Recently spotted <span aria-hidden="true">🐾</span></h2>
        <div class="sightings-grid" id="sightings-grid"></div>
      </section>
    </main>

    <footer>
      <p>No chickens were streamed against their will. 🐓</p>
      <p class="footer-meta">Made by Gio Coia</p>
      <a
        class="gh-link"
        href="https://github.com/gitgc/rtsp-cam-broadcaster"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="gh-icon" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
        </svg>
        GitHub
      </a>
    </footer>

    <script src="/vendor/hls.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
